name: deploy-pages

on:
  workflow_dispatch:
  workflow_call:

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # 日次ジョブがpushした最新を確実に拾う
      - uses: actions/upload-pages-artifact@v3
        with:
          path: issues
      - id: deployment
        uses: actions/deploy-pages@v4
